name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Deploy to Server via rsync
      uses: easingthemes/ssh-deploy@v4
      with:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        REMOTE_HOST: "5.181.253.175"  # Прописали IP явно
        REMOTE_USER: "root"            # Прописали пользователя явно
        TARGET: "/var/www/pguopoprating/"
        SOURCE: "./"
        EXCLUDE: "/.git/, /.github/"